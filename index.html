<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas - Inteligencia Patrimonial</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>

    <style>
        :root {
            --bg-color: #f2f2f7;
            --panel-bg: #ffffff;
            --text-main: #000000;
            --accent: #007aff;
            --border: #d1d1d6;
            --green: #34c759;
            --red: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; position: relative; }

        /* BARRA LATERAL DESLIZANTE */
        .sidebar { 
            width: 300px; 
            background: var(--panel-bg); 
            border-right: 1px solid var(--border); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            height: 100vh;
            position: fixed;
            top: 0;
            left: -300px;
            z-index: 999;
            transition: left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            box-shadow: 5px 0 25px rgba(0,0,0,0.08);
        }
        
        .sidebar.open { left: 0; }
        
        .main-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .top-navbar { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }

        .nav-buttons { display: flex; gap: 10px; }

        .btn-navbar {
            background: var(--panel-bg); color: var(--accent); border: 1px solid var(--border);
            font-size: 22px; padding: 10px 15px; border-radius: 12px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: center;
        }
        .btn-navbar:active { opacity: 0.7; }
        .btn-navbar.active-privacy { background: #e5e5ea; color: #5856d6; border-color: #5856d6; }

        h2 { font-size: 22px; font-weight: 700; }
        h3 { font-size: 14px; text-transform: uppercase; color: #8e8e93; font-weight: 700; margin-top: 10px; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; text-transform: uppercase; color: #8e8e93; font-weight: 600; }
        input, select { padding: 14px; border-radius: 12px; font-size: 16px; background: #f2f2f7; border: none; width: 100%; color: var(--text-main); }
        
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:active { opacity: 0.8; }
        
        .btn-add-trigger { background: var(--green); padding: 15px; font-size: 16px; width: 100%; }
        
        .btn-secundario { background: #e5e5ea; color: #007aff; padding: 10px; font-size: 14px; border-radius: 10px; text-align: center; }
        .btn-secundario:active { background: #d1d1d6; }

        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .dashboard-row { grid-template-columns: 1fr; } }

        .card { background: var(--panel-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        
        .header-patrimonio { display: flex; flex-direction: column; gap: 6px; }
        .total-amount { font-size: 42px; font-weight: 800; color: #1c1c1e; transition: filter 0.1s ease; }
        
        /* FUNCIÓN 2: ESTILOS DE INCREMENTO MENSUAL */
        .delta-badge { font-size: 16px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; width: fit-content; }
        .delta-positive { color: var(--green); background: rgba(52, 199, 89, 0.1); }
        .delta-negative { color: var(--red); background: rgba(255, 59, 48, 0.1); }
        .delta-neutral { color: #8e8e93; background: rgba(142, 142, 147, 0.1); }

        .sub-amounts { font-size: 15px; font-weight: 600; color: #8e8e93; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 2px; }

        .chart-container { width: 100%; height: 270px; position: relative; margin-top: 15px; }

        .assets-list { background: var(--panel-bg); border-radius: 20px; padding: 10px 25px; list-style: none; margin-top: 10px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #f2f2f7; }
        .asset-item:last-child { border-bottom: none; }
        
        .asset-item.total-row { border-top: 2px solid #1c1c1e; font-weight: 700; font-size: 17px; padding-top: 15px; background-color: rgba(0,0,0,0.01); border-bottom: none; align-items: flex-start; }
        .total-breakdown-list { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; text-align: right; }

        .asset-info name { font-weight: 600; font-size: 17px; display: block; }
        .asset-info type { font-size: 13px; color: #8e8e93; }
        
        /* FUNCIÓN 3: ENTRADAS DE APORTACIONES EN LÍNEA */
        .asset-actions { display: flex; align-items: center; gap: 10px; }
        .input-wrapper { display: flex; flex-direction: column; gap: 4px; text-align: right; }
        .input-wrapper label { font-size: 10px; font-weight: 700; color: #8e8e93; text-transform: uppercase; }
        .update-input { width: 110px; padding: 8px; font-size: 15px; text-align: right; font-weight: 600; border: 1px solid #e5e5ea; border-radius: 8px; background: #fafafa; }
        .update-input.aporte-field { background: #f1fcf4; border-color: #c7eed2; color: #1e7e34; }
        
        .btn-save { background: var(--green); padding: 10px 15px; font-size: 14px; border-radius: 8px; height: 37px; align-self: flex-end; }
        .btn-del { color: var(--red); background: none; font-size: 18px; padding: 5px; margin-left: 2px; border: none; cursor: pointer; }

        /* MODO PRIVACIDAD (DIFUMINADO) */
        .privacy-blur { filter: blur(6px); pointer-events: none; user-select: none; }

        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15); display: none; z-index: 998; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-card { background: var(--panel-bg); padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 15px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; color: #8e8e93; font-size: 20px; cursor: pointer; padding: 5px; border: none; }

        hr { border: 0; border-top: 1px solid #f2f2f7; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="capaFondoSidebar" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="barraLateral">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2>Menú y Ajustes</h2>
            <button style="background: none; color: var(--accent); font-size: 24px; border:none;" onclick="toggleSidebar()">✕</button>
        </div>
        
        <h3>Visualización</h3>
        <div class="form-group">
            <label>Mes de análisis</label>
            <input type="month" id="filtroMes" onchange="actualizarUI()">
        </div>
        <div class="form-group">
            <label>Moneda Principal</label>
            <select id="selectorDivisa" onchange="cambiarDivisa()">
                <option value="EUR">Euros (€)</option>
                <option value="CHF">Francos Suizos (CHF)</option>
                <option value="USD">Dólares ($)</option>
                <option value="GBP">Libras (£)</option>
            </select>
        </div>
        
        <hr>
        
        <h3>Acciones</h3>
        <button class="btn-add-trigger" onclick="abrirModal()">＋ Nuevo Activo</button>
        
        <hr>

        <h3>Copia de Seguridad</h3>
        <button class="btn-secundario" onclick="exportarMatrizCSV()">📥 Guardar Datos (Excel/CSV)</button>
        
        <label class="btn-secundario" style="cursor: pointer; font-weight:600;">
            📤 Recuperar desde archivo
            <input type="file" id="importarFile" accept=".csv" style="display: none;" onchange="importarMatrizCSV(this)">
        </label>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="nav-buttons">
                <button class="btn-navbar" onclick="toggleSidebar()">☰</button>
                <button class="btn-navbar" id="btnPrivacidad" onclick="togglePrivacidad()">👁</button>
            </div>
            <h2 id="tituloVista" style="font-size: 24px;">Patrimonio Neto</h2>
        </div>

        <header class="header-patrimonio">
            <div class="total-amount" id="totalNeto">0,00 €</div>
            
            <div id="variacionMensualBadge" class="delta-badge delta-neutral">0.00%</div>
            
            <div class="sub-amounts" id="equivalenciasHeader">Cargando tipos de cambio...</div>
        </header>

        <div class="dashboard-row">
            <div class="card">
                <label style="font-weight: 600; color: #8e8e93;">DISTRIBUCIÓN ACTUAL (%)</label>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="card">
                <label style="font-weight: 600; color: #8e8e93;">PATRIMONIO TOTAL vs CAPITAL INVERTIDO</label>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <h2>Detalle de saldos mensuales</h2>
        <ul class="assets-list" id="listaActivos"></ul>
    </div>

    <div class="modal-overlay" id="nuevoActivoModal" onclick="cerrarModalFuera(event)">
        <div class="modal-card">
            <button class="modal-close" onclick="cerrarModal()">✕</button>
            <h2 style="margin-bottom: 10px;">Añadir Nuevo Activo</h2>
            
            <div class="form-group">
                <label>Nombre del activo</label>
                <input type="text" id="nombre" placeholder="Ej: Cuenta Suiza">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="tipo">
                    <option value="Saving account">Saving account</option>
                    <option value="Deposit">Deposit</option>
                    <option value="Letras del Tesoro">Letras del Tesoro</option>
                    <option value="3 Säule">3 Säule</option>
                    <option value="Stocks & ETF VT">Stocks & ETF VT</option>
                    <option value="Crypto">Crypto</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            <div class="form-group">
                <label id="labelBalance">Valor Inicial</label>
                <input type="number" id="balance" placeholder="0.00" step="0.01">
            </div>
            <button style="margin-top: 10px;" onclick="crearActivo()">Guardar en el Panel</button>
        </div>
    </div>

    <script>
        let rates = { EUR: 1, CHF: 0.96, USD: 1.09, GBP: 0.85 };
        let esModoPrivado = false; // Estado Global Función 4

        function toggleSidebar() {
            const sidebar = document.getElementById('barraLateral');
            const overlay = document.getElementById('capaFondoSidebar');
            if(sidebar.classList.contains('open')) {
                sidebar.classList.remove('open'); overlay.style.display = 'none';
            } else {
                sidebar.classList.add('open'); overlay.style.display = 'block';
            }
        }

        // FUNCIÓN 4: CONTROL DE MODO PRIVACIDAD
        function togglePrivacidad() {
            esModoPrivado = !esModoPrivado;
            const btn = document.getElementById('btnPrivacidad');
            
            if(esModoPrivado) {
                btn.classList.add('active-privacy');
                btn.innerText = "🙈";
            } else {
                btn.classList.remove('active-privacy');
                btn.innerText = "👁";
            }
            actualizarUI(); // Renderiza de nuevo aplicando los difuminados
        }

        function aplicarFiltroPrivacidad(elemento) {
            if (esModoPrivado) elemento.classList.add('privacy-blur');
            else elemento.classList.remove('privacy-blur');
        }

        function abrirModal() { toggleSidebar(); document.getElementById('nuevoActivoModal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('nuevoActivoModal').style.display = 'none'; }
        function cerrarModalFuera(e) { if(e.target.id === 'nuevoActivoModal') cerrarModal(); }

        async function obtenerTasasReales() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const data = await res.json();
                if(data && data.rates) rates = data.rates;
            } catch (e) { console.log("Modo offline o API bloqueada."); }
        }

        const hoy = new Date();
        document.getElementById('filtroMes').value = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}`;

        if(!localStorage.getItem('divisaSeleccionada')) localStorage.setItem('divisaSeleccionada', 'EUR');
        document.getElementById('selectorDivisa').value = localStorage.getItem('divisaSeleccionada');

        const categoriasColores = {
            "Saving account": "#4CAF50", "Deposit": "#8BC34A", "Letras del Tesoro": "#9E9E9E",
            "3 Säule": "#FFC107", "Stocks & ETF VT": "#2196F3", "Crypto": "#FF5722", "Otros": "#E91E63"
        };

        // ACTUALIZACIÓN DE BASE DE DATOS (AÑADIDO EL CAMPO 'aporte')
        const db = new Dexie("PatrimonioRealDB");
        db.version(2).stores({ 
            activos: '++id, nombre, tipo', 
            historial: '++id, activoId, mes, valor, aporte' 
        }).upgrade(tx => {}); // Auto actualiza estructuras antiguas

        let pieChartInstance = null; let barChartInstance = null;
        let formatterMain = inicializarFormateador(localStorage.getItem('divisaSeleccionada'));

        function inicializarFormateador(divisa) {
            const localesMap = { 'EUR': 'es-ES', 'USD': 'en-US', 'CHF': 'de-CH', 'GBP': 'en-GB' };
            return new Intl.NumberFormat(localesMap[divisa] || 'es-ES', { style: 'currency', currency: divisa });
        }

        function cambiarDivisa() {
            const nueva = document.getElementById('selectorDivisa').value;
            localStorage.setItem('divisaSeleccionada', nueva);
            formatterMain = inicializarFormateador(nueva);
            actualizarUI();
        }

        async function crearActivo() {
            const nombre = document.getElementById('nombre').value;
            const tipo = document.getElementById('tipo').value;
            const valor = parseFloat(document.getElementById('balance').value);
            const mes = document.getElementById('filtroMes').value;

            if(!nombre || isNaN(valor)) return;

            const id = await db.activos.add({ nombre, tipo });
            await db.historial.add({ activoId: id, mes, valor, aporte: 0 }); // Aporte por defecto 0
            
            document.getElementById('nombre').value = "";
            document.getElementById('balance').value = "";
            cerrarModal();
            actualizarUI();
        }

        // FUNCIÓN 3: EDITAR REGISTROS CON VALOR Y APORTE SIMULTÁNEAMENTE
        async function actualizarValor(activoId, nuevoValor, nuevoAporte) {
            const mes = document.getElementById('filtroMes').value;
            const reg = await db.historial.where({ activoId, mes }).first();
            
            if(reg) {
                await db.historial.update(reg.id, { valor: nuevoValor, aporte: nuevoAporte });
            } else {
                await db.historial.add({ activoId, mes, valor: nuevoValor, aporte: nuevoAporte });
            }
            actualizarUI();
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar este activo por completo de todos los meses históricos?")) {
                await db.activos.delete(id);
                await db.historial.where('activoId').equals(id).delete();
                actualizarUI();
            }
        }

        // EXPORTACIÓN MATRICIAL OPTIMIZADA CON APORTACIONES
        async function exportarMatrizCSV() {
            const activos = await db.activos.toArray();
            const historial = await db.historial.toArray();
            if(activos.length === 0) { alert("No hay datos."); return; }

            const mesesUnicos = Array.from(new Set(historial.map(h => h.mes))).sort();
            
            // Creamos columnas dobles por mes: [Mes]_Saldo, [Mes]_Aporte
            let cabecera = ["Activo", "Categoria"];
            mesesUnicos.forEach(m => {
                cabecera.push(`${m}_Saldo`);
                cabecera.push(`${m}_Aporte`);
            });

            let lineas = [cabecera.map(c => `"${c}"`).join(",")];

            activos.forEach(a => {
                let fila = [`"${a.nombre}"`, `"${a.tipo}"`];
                mesesUnicos.forEach(m => {
                    const r = historial.find(h => h.activoId === a.id && h.mes === m);
                    fila.push(r ? r.valor.toFixed(2) : "0.00");
                    fila.push(r && r.aporte ? r.aporte.toFixed(2) : "0.00");
                });
                lineas.push(fila.join(","));
            });

            const csvTexto = "\uFEFF" + lineas.join("\n");
            const blob = new Blob([csvTexto], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Patrimonio_Avanzado_${document.getElementById('filtroMes').value}.csv`;
            link.click();
        }

        // IMPORTACIÓN MATRICIAL INTELIGENTE CON APORTACIONES
        function importarMatrizCSV(input) {
            const file = input.files[0];
            if (!file) return;

            const lector = new FileReader();
            lector.onload = async function(e) {
                const texto = e.target.result;
                const lineas = texto.split(/\r?\n/);
                if(lineas.length < 2) return;
                
                const cabecera = lineas[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                if(cabecera[0] !== "Activo") { alert("Formato no válido."); return; }

                if(confirm("¿Proceder con la restauración masiva?")) {
                    for(let i = 1; i < lineas.length; i++) {
                        const linea = lineas[i].trim(); if(!linea) continue;
                        const celdas = linea.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                        
                        const nombre = celdas[0]; const tipo = celdas[1];
                        if(!nombre || !tipo) continue;

                        let activo = await db.activos.where({ nombre: nombre }).first();
                        let aId = activo ? activo.id : await db.activos.add({ nombre, tipo });

                        // Leer los meses dinámicamente saltando de 2 en 2 (Saldo y Aporte)
                        for(let j = 2; j < cabecera.length; j += 2) {
                            const mesCabecera = cabecera[j].replace("_Saldo", "");
                            const valor = parseFloat(celdas[j]) || 0;
                            const aporte = parseFloat(celdas[j+1]) || 0;

                            let h = await db.historial.where({ activoId: aId, mes: mesCabecera }).first();
                            if(h) await db.historial.update(h.id, { valor, aporte });
                            else await db.historial.add({ activoId: aId, mes: mesCabecera, valor, aporte });
                        }
                    }
                    alert("Importación de datos completada.");
                    toggleSidebar(); actualizarUI();
                }
            };
            lector.readAsText(file, "UTF-8");
            input.value = "";
        }

        // OBTENER TOTAL DE CUALQUIER MES PARA CÁLCULOS COMPARATIVOS
        async function calcularTotalMes(mesFiltro) {
            const activos = await db.activos.toArray();
            let total = 0;
            for(let a of activos) {
                let h = await db.historial.where({ activoId: a.id, mes: mesFiltro }).first();
                if(!h) {
                    const last = await db.historial.where('activoId').equals(a.id).and(x => x.mes < mesFiltro).reverse().sortBy('mes');
                    h = last[0] || { valor: 0 };
                }
                total += h.valor;
            }
            return total;
        }

        // CORE UI ENGINE
        async function actualizarUI() {
            const mesSel = document.getElementById('filtroMes').value;
            const activos = await db.activos.toArray();
            const lista = document.getElementById('listaActivos');
            lista.innerHTML = "";

            let totalGlobalBase = 0;
            const porCategorias = { "Saving account": 0, "Deposit": 0, "Letras del Tesoro": 0, "3 Säule": 0, "Stocks & ETF VT": 0, "Crypto": 0, "Otros": 0 };

            const divisaActual = localStorage.getItem('divisaSeleccionada');
            const mapaSimbolos = { 'EUR': '€', 'USD': '$', 'CHF': 'CHF', 'GBP': '£' };
            document.getElementById('labelBalance').innerText = `Valor Inicial (${mapaSimbolos[divisaActual]})`;

            for(let a of activos) {
                let h = await db.historial.where({ activoId: a.id, mes: mesSel }).first();
                if(!h) {
                    const last = await db.historial.where('activoId').equals(a.id).and(x => x.mes < mesSel).reverse().sortBy('mes');
                    h = last[0] || { valor: 0, aporte: 0 };
                }

                let valorAporte = h.aporte || 0;
                totalGlobalBase += h.valor;
                porCategorias[a.tipo] += h.valor;

                const li = document.createElement('li');
                li.className = 'asset-item';
                li.innerHTML = `
                    <div class="asset-info">
                        <name>${a.nombre}</name>
                        <type>${a.tipo}</type>
                    </div>
                    <div class="asset-actions">
                        <div class="input-wrapper">
                            <label>Saldo (${mapaSimbolos[divisaActual]})</label>
                            <input type="number" id="in-val-${a.id}" class="update-input numeric-blur" value="${h.valor.toFixed(2)}">
                        </div>
                        <div class="input-wrapper">
                            <label>Aporte Neto</label>
                            <input type="number" id="in-apt-${a.id}" class="update-input aporte-field numeric-blur" value="${valorAporte.toFixed(2)}" placeholder="0.00">
                        </div>
                        <button class="btn-save" onclick="actualizarValor(${a.id}, parseFloat(document.getElementById('in-val-${a.id}').value), parseFloat(document.getElementById('in-apt-${a.id}').value))">✓</button>
                        <button class="btn-del" onclick="eliminar(${a.id})">✕</button>
                    </div>
                `;
                lista.appendChild(li);
            }

            // FUNCIÓN 2: LÓGICA DE VARIACIÓN NETAS MENSUALES
            const partesMes = mesSel.split("-");
            let anioAnterior = parseInt(partesMes[0]);
            let mesAnterior = parseInt(partesMes[1]) - 1;
            if(mesAnterior === 0) { mesAnterior = 12; anioAnterior -= 1; }
            const stringMesAnterior = `${anioAnterior}-${String(mesAnterior).padStart(2, '0')}`;
            
            const totalMesAnterior = await calcularTotalMes(stringMesAnterior);
            const badgeVariacion = document.getElementById('variacionMensualBadge');
            
            if(totalMesAnterior > 0) {
                const diffNeto = totalGlobalBase - totalMesAnterior;
                const porcentaje = (diffNeto / totalMesAnterior) * 100;
                const signo = diffNeto >= 0 ? "▲" : "▼";
                
                badgeVariacion.innerText = `${signo} ${formatterMain.format(diffNeto)} (${porcentaje.toFixed(2)}%) vs mes anterior`;
                badgeVariacion.className = `delta-badge ${diffNeto >= 0 ? 'delta-positive' : 'delta-negative'}`;
            } else {
                badgeVariacion.innerText = "● Primer mes del registro";
                badgeVariacion.className = "delta-badge delta-neutral";
            }

            // EQUIVALENCIAS MULTIDIVISAS
            const tasaAMedida = rates[divisaActual] || 1;
            const totalEnEUR = totalGlobalBase / tasaAMedida;
            const totalCHF = totalEnEUR * rates['CHF'];
            const totalEUR = totalEnEUR * rates['EUR'];
            const totalUSD = totalEnEUR * rates['USD'];

            const fCHF = inicializarFormateador('CHF');
            const fEUR = inicializarFormateador('EUR');
            const fUSD = inicializarFormateador('USD');

            // CONFIGURAR CONTENEDORES PRINCIPALES DE SALDOS
            const domTotalNeto = document.getElementById('totalNeto');
            const domEquivalencias = document.getElementById('equivalenciasHeader');

            domTotalNeto.innerText = formatterMain.format(totalGlobalBase);
            domEquivalencias.innerHTML = `
                <span>Equivale a:</span> 
                <span style="color:#1c1c1e" class="numeric-blur">${fCHF.format(totalCHF)}</span> • 
                <span style="color:#1c1c1e" class="numeric-blur">${fEUR.format(totalEUR)}</span> • 
                <span style="color:#1c1c1e" class="numeric-blur">${fUSD.format(totalUSD)}</span>
            `;

            if(activos.length > 0) {
                const liTotal = document.createElement('li');
                liTotal.className = 'asset-item total-row';
                liTotal.innerHTML = `
                    <div>SUMA TOTAL DEL MES</div>
                    <div class="total-breakdown-list" style="padding-right: 64px;">
                        <div style="color: var(--accent); font-size: 20px;" class="numeric-blur">${formatterMain.format(totalGlobalBase)}</div>
                        <div style="font-size: 14px;" class="numeric-blur">${fCHF.format(totalCHF)} (CHF)</div>
                        <div style="font-size: 14px;" class="numeric-blur">${fEUR.format(totalEUR)} (EUR)</div>
                    </div>
                `;
                lista.appendChild(liTotal);
            }

            // APLICAR FILTROS DE PRIVACIDAD SI CORRESPONDE (FUNCIÓN 4)
            aplicarFiltroPrivacidad(domTotalNeto);
            aplicarFiltroPrivacidad(domEquivalencias);
            document.querySelectorAll('.numeric-blur').forEach(el => aplicarFiltroPrivacidad(el));

            document.getElementById('tituloVista').innerText = `Patrimonio Neto - ${mesSel}`;
            renderPie(porCategorias, totalGlobalBase);
            await renderAnalisisEvolucionInversion();
        }

        function renderPie(datos, total) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            const labelsFiltrados = Object.keys(datos).filter(k => datos[k] > 0);
            const valoresFiltrados = labelsFiltrados.map(k => datos[k]);
            const coloresFiltrados = labelsFiltrados.map(k => categoriasColores[k]);

            if(pieChartInstance) pieChartInstance.destroy();
            if(total === 0) return;

            const etiquetasConPorcentaje = labelsFiltrados.map(label => {
                const porcentaje = ((datos[label] / total) * 100).toFixed(1);
                return `${label} (${porcentaje}%)`;
            });

            pieChartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: etiquetasConPorcentaje,
                    datasets: [{ data: valoresFiltrados, backgroundColor: coloresFiltrados, borderWidth: 1.5 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { font: { size: 11, weight: 'bold' }, boxWidth: 12 } } }
                }
            });
        }

        // FUNCIÓN 3: NUEVO REPROCESADOR DE GRÁFICO COMBINADO (PATRIMONIO vs DINERO ACUMULADO)
        async function renderAnalisisEvolucionInversion() {
            const ctx = document.getElementById('barChart').getContext('2d');
            const todosActivos = await db.activos.toArray();
            const historialCompleto = await db.historial.toArray();
            
            const mesesOrdenados = Array.from(new Set(historialCompleto.map(h => h.mes))).sort();

            let datasetSaldosPatrimonio = [];
            let datasetAportacionesAcumuladas = [];
            let capitalAcumuladoAcumulativo = 0;

            // Recorremos de manera cronológica lineal para trazar el crecimiento acumulativo real
            for(let mes of mesesOrdenados) {
                let patrimonioTotalMes = 0;
                let aportacionesDelMes = 0;

                for(let a of todosActivos) {
                    let h = await db.historial.where({ activoId: a.id, mes: mes }).first();
                    if(!h) {
                        const last = await db.historial.where('activoId').equals(a.id).and(x => x.mes < mes).reverse().sortBy('mes');
                        h = last[0] || { valor: 0, aporte: 0 };
                    }
                    patrimonioTotalMes += h.valor;
                    aportacionesDelMes += (h.aporte || 0);
                }

                capitalAcumuladoAcumulativo += aportacionesDelMes;

                datasetSaldosPatrimonio.push(patrimonioTotalMes);
                // Si el patrimonio cae por debajo del capital acumulado debido al mercado, se mapea correctamente
                datasetAportacionesAcumuladas.push(capitalAcumuladoAcumulativo);
            }

            if(barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctx, {
                data: {
                    labels: mesesOrdenados,
                    datasets: [
                        {
                            type: 'bar',
                            label: 'Patrimonio Neto',
                            data: datasetSaldosPatrimonio,
                            backgroundColor: 'rgba(0, 122, 255, 0.45)',
                            borderColor: '#007aff',
                            borderWidth: 1.5,
                            borderRadius: 6
                        },
                        {
                            type: 'line',
                            label: 'Capital Invertido (Bolsillo)',
                            data: datasetAportacionesAcumuladas,
                            borderColor: '#5856d6',
                            borderWidth: 3,
                            pointBackgroundColor: '#5856d6',
                            tension: 0.18,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top', labels: { font: { weight: 'bold' } } } },
                    scales: {
                        y: { grid: { color: '#e5e5ea' }, ticks: { font: { size: 11 } } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        async function iniciarApp() {
            await obtenerTasasReales();
            cambiarDivisa();
        }
        
        iniciarApp();
    </script>
