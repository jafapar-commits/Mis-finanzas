<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas - Inteligente Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>

    <style>
        :root {
            --bg-color: #f2f2f7;
            --panel-bg: #ffffff;
            --text-main: #000000;
            --accent: #007aff;
            --border: #d1d1d6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Estructura Limpia del iPad */
        .sidebar { width: 300px; background: var(--panel-bg); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }

        h2 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        label { font-size: 13px; text-transform: uppercase; color: #8e8e93; font-weight: 600; }
        input, select { padding: 14px; border-radius: 12px; font-size: 16px; background: #f2f2f7; border: none; width: 100%; }
        
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:active { opacity: 0.8; }
        
        .btn-add-trigger { background: #34c759; margin-top: auto; padding: 16px; font-size: 17px; }

        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--panel-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        
        /* Cabecera con Divisas cruzadas */
        .header-patrimonio { display: flex; flex-direction: column; gap: 4px; }
        .total-amount { font-size: 42px; font-weight: 800; color: #1c1c1e; }
        .sub-amounts { font-size: 18px; font-weight: 600; color: #8e8e93; display: flex; gap: 15px; }

        .chart-container { width: 100%; height: 260px; position: relative; margin-top: 15px; }

        /* Lista de activos y totales */
        .assets-list { background: var(--panel-bg); border-radius: 20px; padding: 10px 25px; list-style: none; margin-top: 10px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #f2f2f7; }
        .asset-item:last-child { border-bottom: none; }
        
        /* Bloque de totales al final de la lista */
        .asset-item.total-row { border-top: 2px solid #1c1c1e; font-weight: 700; font-size: 17px; padding-top: 15px; background-color: rgba(0,0,0,0.01); border-bottom: none; align-items: flex-start; }
        .total-breakdown-list { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; text-align: right; }

        .asset-info name { font-weight: 600; font-size: 17px; display: block; }
        .asset-info type { font-size: 13px; color: #8e8e93; }
        
        .asset-actions { display: flex; align-items: center; gap: 12px; }
        .update-input { width: 110px; padding: 8px; font-size: 15px; text-align: right; font-weight: 600; border: 1px solid #e5e5ea; border-radius: 8px; }
        .btn-save { background: #34c759; padding: 8px 15px; font-size: 14px; border-radius: 8px; }
        .btn-del { color: #ff3b30; background: none; font-size: 18px; padding: 5px; }

        /* MODAL / PESTAÑA FLOTANTE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.2s ease; }
        .modal-card { background: var(--panel-bg); padding: 30px; border-radius: 24px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 15px; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; color: #8e8e93; font-size: 20px; cursor: pointer; padding: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        hr { border: 0; border-top: 1px solid #f2f2f7; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Preferencias</h2>
        <div class="form-group">
            <label>Moneda Principal</label>
            <select id="selectorDivisa" onchange="cambiarDivisa()">
                <option value="EUR">Euros (€)</option>
                <option value="CHF">Francos Suizos (CHF)</option>
                <option value="USD">Dólares ($)</option>
                <option value="GBP">Libras (£)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Mes de análisis</label>
            <input type="month" id="filtroMes" onchange="actualizarUI()">
        </div>
        
        <button class="btn-add-trigger" onclick="abrirModal()">＋ Nuevo Activo</button>
    </div>

    <div class="main-content">
        <header class="header-patrimonio">
            <h2 id="tituloVista">Patrimonio</h2>
            <div class="total-amount" id="totalNeto">0,00 €</div>
            <div class="sub-amounts" id="equivalenciasHeader">Cargando tipos de cambio...</div>
        </header>

        <div class="dashboard-row">
            <div class="card">
                <label style="font-weight: 600; color: #8e8e93;">DISTRIBUCIÓN ACTUAL (%)</label>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="card">
                <label style="font-weight: 600; color: #8e8e93;">EVOLUCIÓN MENSUAL POR CATEGORÍAS</label>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <h2>Detalle de saldos mensuales</h2>
        <ul class="assets-list" id="listaActivos"></ul>
    </div>

    <div class="modal-overlay" id="nuevoActivoModal" onclick="cerrarModalFuera(event)">
        <div class="modal-card">
            <button class="modal-close" onclick="cerrarModal()">✕</button>
            <h2 style="margin-bottom: 10px;">Añadir Nuevo Activo</h2>
            
            <div class="form-group">
                <label>Nombre del activo</label>
                <input type="text" id="nombre" placeholder="Ej: Cuenta Suiza">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="tipo">
                    <option value="Saving account">Saving account</option>
                    <option value="Deposit">Deposit</option>
                    <option value="Letras del Tesoro">Letras del Tesoro</option>
                    <option value="3 Säule">3 Säule</option>
                    <option value="Stocks & ETF VT">Stocks & ETF VT</option>
                    <option value="Crypto">Crypto</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            <div class="form-group">
                <label id="labelBalance">Valor Inicial</label>
                <input type="number" id="balance" placeholder="0.00" step="0.01">
            </div>
            <button style="margin-top: 10px;" onclick="crearActivo()">Guardar en el Panel</button>
        </div>
    </div>

    <script>
        // Variables de tipos de cambio (tasas base en EUR por defecto)
        let rates = { EUR: 1, CHF: 0.96, USD: 1.09, GBP: 0.85 };

        // Forzar carga de cotizaciones reales desde internet
        async function obtenerTasasReales() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const data = await res.json();
                if(data && data.rates) {
                    rates = data.rates;
                    console.log("Tipos de cambio actualizados en tiempo real:", rates);
                }
            } catch (e) {
                console.log("No hay internet en el iPad. Usando tasas fijas de seguridad.");
            }
        }

        // Control de Pestaña Flotante (Modal)
        function abrirModal() { document.getElementById('nuevoActivoModal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('nuevoActivoModal').style.display = 'none'; }
        function cerrarModalFuera(e) { if(e.target.id === 'nuevoActivoModal') cerrarModal(); }

        const hoy = new Date();
        document.getElementById('filtroMes').value = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}`;

        if(!localStorage.getItem('divisaSeleccionada')) localStorage.setItem('divisaSeleccionada', 'EUR');
        document.getElementById('selectorDivisa').value = localStorage.getItem('divisaSeleccionada');

        const categoriasColores = {
            "Saving account": "#4CAF50", "Deposit": "#8BC34A", "Letras del Tesoro": "#9E9E9E",
            "3 Säule": "#FFC107", "Stocks & ETF VT": "#2196F3", "Crypto": "#FF5722", "Otros": "#E91E63"
        };

        const db = new Dexie("PatrimonioRealDB");
        db.version(1).stores({ activos: '++id, nombre, tipo', historial: '++id, activoId, mes, valor' });

        let pieChartInstance = null; let barChartInstance = null;
        let formatterMain = inicializarFormateador(localStorage.getItem('divisaSeleccionada'));

        function inicializarFormateador(divisa) {
            const localesMap = { 'EUR': 'es-ES', 'USD': 'en-US', 'CHF': 'de-CH', 'GBP': 'en-GB' };
            return new Intl.NumberFormat(localesMap[divisa] || 'es-ES', { style: 'currency', currency: divisa });
        }

        function cambiarDivisa() {
            const nueva = document.getElementById('selectorDivisa').value;
            localStorage.setItem('divisaSeleccionada', nueva);
            formatterMain = inicializarFormateador(nueva);
            actualizarUI();
        }

        async function crearActivo() {
            const nombre = document.getElementById('nombre').value;
            const tipo = document.getElementById('tipo').value;
            const valor = parseFloat(document.getElementById('balance').value);
            const mes = document.getElementById('filtroMes').value;

            if(!nombre || isNaN(valor)) return;

            const id = await db.activos.add({ nombre, tipo });
            await db.historial.add({ activoId: id, mes, valor });
            
            document.getElementById('nombre').value = "";
            document.getElementById('balance').value = "";
            cerrarModal();
            actualizarUI();
        }

        async function actualizarValor(activoId, nuevoValor) {
            const mes = document.getElementById('filtroMes').value;
            const reg = await db.historial.where({ activoId, mes }).first();
            if(reg) await db.historial.update(reg.id, { valor: nuevoValor });
            else await db.historial.add({ activoId, mes, valor: nuevoValor });
            actualizarUI();
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar este activo?")) {
                await db.activos.delete(id);
                await db.historial.where('activoId').equals(id).delete();
                actualizarUI();
            }
        }

        async function actualizarUI() {
            const mesSel = document.getElementById('filtroMes').value;
            const activos = await db.activos.toArray();
            const lista = document.getElementById('listaActivos');
            lista.innerHTML = "";

            let totalGlobalBase = 0;
            const porCategorias = { "Saving account": 0, "Deposit": 0, "Letras del Tesoro": 0, "3 Säule": 0, "Stocks & ETF VT": 0, "Crypto": 0, "Otros": 0 };

            const divisaActual = localStorage.getItem('divisaSeleccionada');
            const mapaSimbolos = { 'EUR': '€', 'USD': '$', 'CHF': 'CHF', 'GBP': '£' };
            document.getElementById('labelBalance').innerText = `Valor Inicial (${mapaSimbolos[divisaActual]})`;

            for(let a of activos) {
                let h = await db.historial.where({ activoId: a.id, mes: mesSel }).first();
                if(!h) {
                    const last = await db.historial.where('activoId').equals(a.id).and(x => x.mes < mesSel).reverse().sortBy('mes');
                    h = last[0] || { valor: 0 };
                }

                totalGlobalBase += h.valor;
                porCategorias[a.tipo] += h.valor;

                const li = document.createElement('li');
                li.className = 'asset-item';
                li.innerHTML = `
                    <div class="asset-info">
                        <name>${a.nombre}</name>
                        <type>${a.tipo}</type>
                    </div>
                    <div class="asset-actions">
                        <input type="number" id="in-${a.id}" class="update-input" value="${h.valor.toFixed(2)}">
                        <button class="btn-save" onclick="actualizarValor(${a.id}, parseFloat(document.getElementById('in-${a.id}').value))">✓ Guardar</button>
                        <button class="btn-del" onclick="eliminar(${a.id})">✕</button>
                    </div>
                `;
                lista.appendChild(li);
            }

            // CALCULAR CONVERSIONES DE DIVISAS AUTOMÁTICAS
            // Convertimos el total (que está en la divisa elegida) a EUR base y de ahí a las demás
            const tasaAMedida = rates[divisaActual];
            const totalEnEUR = totalGlobalBase / tasaAMedida;

            const totalCHF = totalEnEUR * rates['CHF'];
            const totalEUR = totalEnEUR * rates['EUR'];
            const totalUSD = totalEnEUR * rates['USD'];

            const fCHF = inicializarFormateador('CHF');
            const fEUR = inicializarFormateador('EUR');
            const fUSD = inicializarFormateador('USD');

            // Actualizar la cabecera del programa
            document.getElementById('totalNeto').innerText = formatterMain.format(totalGlobalBase);
            document.getElementById('equivalenciasHeader').innerHTML = `
                <span>Equivale a:</span> 
                <span style="color:#1c1c1e">${fCHF.format(totalCHF)}</span> • 
                <span style="color:#1c1c1e">${fEUR.format(totalEUR)}</span> • 
                <span style="color:#1c1c1e">${fUSD.format(totalUSD)}</span>
            `;

            // MEJORA: Fila final de la lista con desglose completo de las 3 monedas
            if(activos.length > 0) {
                const liTotal = document.createElement('li');
                liTotal.className = 'asset-item total-row';
                liTotal.innerHTML = `
                    <div>SUMA TOTAL DEL MES</div>
                    <div class="total-breakdown-list" style="padding-right: 48px;">
                        <div style="color: var(--accent); font-size: 20px;">${formatterMain.format(totalGlobalBase)}</div>
                        <div style="font-size: 14px;">${fCHF.format(totalCHF)} (CHF)</div>
                        <div style="font-size: 14px;">${fEUR.format(totalEUR)} (EUR)</div>
                    </div>
                `;
                lista.appendChild(liTotal);
            }

            document.getElementById('tituloVista').innerText = `Patrimonio Neto - ${mesSel}`;
            renderPie(porCategorias, totalGlobalBase);
            await renderBarHistorico();
        }

        function renderPie(datos, total) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            const labelsFiltrados = Object.keys(datos).filter(k => datos[k] > 0);
            const valoresFiltrados = labelsFiltrados.map(k => datos[k]);
            const coloresFiltrados = labelsFiltrados.map(k => categoriasColores[k]);

            if(pieChartInstance) pieChartInstance.destroy();
            if(total === 0) return;

            const etiquetasConPorcentaje = labelsFiltrados.map(label => {
                const porcentaje = ((datos[label] / total) * 100).toFixed(1);
                return `${label} (${porcentaje}%)`;
            });

            pieChartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: etiquetasConPorcentaje,
                    datasets: [{ data: valoresFiltrados, backgroundColor: coloresFiltrados, borderWidth: 1.5 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { font: { size: 11, weight: 'bold' }, boxWidth: 12 } } }
                }
            });
        }

        async function renderBarHistorico() {
            const ctx = document.getElementById('barChart').getContext('2d');
            const todosActivos = await db.activos.toArray();
            const historialCompleto = await db.historial.toArray();
            
            const mesesSet = new Set(historialCompleto.map(h => h.mes));
            const mesesOrdenados = Array.from(mesesSet).sort();

            const categoriasLista = Object.keys(categoriasColores);
            const datasets = categoriasLista.map(cat => {
                return { label: cat, data: [], backgroundColor: categoriasColores[cat], borderRadius: 4 };
            });

            for(let mes of mesesOrdenados) {
                const fotoCategoriaMes = { "Saving account": 0, "Deposit": 0, "Letras del Tesoro": 0, "3 Säule": 0, "Stocks & ETF VT": 0, "Crypto": 0, "Otros": 0 };
                for(let a of todosActivos) {
                    let h = await db.historial.where({ activoId: a.id, mes: mes }).first();
                    if(!h) {
                        const last = await db.historial.where('activoId').equals(a.id).and(x => x.mes < mes).reverse().sortBy('mes');
                        h = last[0] || { valor: 0 };
                    }
                    fotoCategoriaMes[a.tipo] += h.valor;
                }
                datasets.forEach(dataset => { dataset.data.push(fotoCategoriaMes[dataset.label]); });
            }

            if(barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: mesesOrdenados, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { stacked: true, grid: { color: '#e5e5ea' }, ticks: { font: { size: 11 } } },
                        x: { stacked: true, grid: { display: false } }
                    }
                }
            });
        }

        // Arrancar la app descargando tipos de cambio de internet
        async function iniciarApp() {
            await obtenerTasasReales();
            cambiarDivisa();
        }
        
        iniciarApp();
    </script>
</body>
</html>
